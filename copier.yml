_subdirectory: template
_templates_suffix: .jinja
_jinja_extensions:
  - jinja2_time.TimeExtension

_exclude:
  - "{% if 'android' not in platforms %}android{% endif %}"
  - "{% if 'ios' not in platforms %}ios{% endif %}"
  - "{% if 'backend' not in platforms %}backend{% endif %}"
  - "{% if 'user-web-app' not in platforms %}user-web-app{% endif %}"
  - "{% if 'admin-web-portal' not in platforms %}admin-web-portal{% endif %}"
  - "{% if 'backend' not in platforms %}infra{% endif %}"
  - "{% if not use_docker %}docker-compose.yml{% endif %}"
  - "{% if 'user-web-app' not in platforms %}.github/workflows/user-web-app.yml{% endif %}"
  - "{% if 'admin-web-portal' not in platforms %}.github/workflows/admin-web-portal.yml{% endif %}"
  - "{% if 'user-web-app' not in platforms and 'admin-web-portal' not in platforms %}docs/deployment/cloudflare-setup.md{% endif %}"
  - "{% if 'user-web-app' not in platforms and 'admin-web-portal' not in platforms %}_templates/page{% endif %}"

# =============================================================================
# Project Identity
# =============================================================================

project_name:
  type: str
  help: "Human-readable project name (e.g., My Awesome App)"
  validator: "{% if not project_name %}Project name is required{% endif %}"

project_slug:
  type: str
  help: "Lowercase slug for directories and packages (e.g., my-awesome-app)"
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

package_identifier:
  type: str
  help: "Reverse-domain package identifier (e.g., com.example.myapp)"
  default: "com.example.{{ project_slug | replace('-', '') }}"

description:
  type: str
  help: "One-line project description"
  default: "A multi-platform application"

package_path:
  type: str
  help: "Package path derived from package identifier (used for directory names)"
  default: "{{ package_identifier | replace('.', '/') }}"
  when: false

ios_module_name:
  type: str
  help: "Valid Swift/Xcode module name derived from the project slug"
  default: "{{ project_slug | replace('-', ' ') | replace('_', ' ') | title | replace(' ', '') }}"
  when: false

# =============================================================================
# Platform Selection
# =============================================================================

platforms:
  type: yaml
  multiselect: true
  help: "Which platforms do you want to include?"
  choices:
    Spring Boot Backend: backend
    User-Facing Web App: user-web-app
    Admin Web Portal: admin-web-portal
    Android (Kotlin/Compose): android
    iOS (Swift/SwiftUI): ios
  default: "[backend, user-web-app, admin-web-portal, android, ios]"

# =============================================================================
# Authentication
# =============================================================================

auth_methods:
  type: yaml
  multiselect: true
  help: "Which authentication methods do you want to support?"
  validator: "{% if 'user-web-app' in platforms and not auth_methods %}User Web App currently requires at least one auth method{% elif 'admin-web-portal' in platforms and 'password' not in auth_methods %}Admin Web Portal currently requires Username + Password auth{% endif %}"
  choices:
    Google OAuth: google
    Apple Sign-In: apple
    Facebook Login: facebook
    Microsoft Account: microsoft
    Username + Password: password
  default: "[google, apple, password]"

# =============================================================================
# Infrastructure
# =============================================================================

database:
  type: str
  help: "Which database do you want to use?"
  choices:
    PostgreSQL (Currently available): postgres
  default: postgres

use_docker:
  type: bool
  help: "Include Docker Compose for local development?"
  default: true

# =============================================================================
# Deployment & Hosting
# =============================================================================

cloud_provider:
  type: str
  help: "Where should backend services be deployed?"
  choices:
    Azure (Currently available): azure
  default: azure

web_hosting:
  type: str
  help: "Where should web applications be deployed?"
  choices:
    Cloudflare via OpenNext (Currently available): cloudflare
  default: cloudflare

# =============================================================================
# Repository
# =============================================================================

github_org:
  type: str
  help: "GitHub organization or username (leave empty to skip)"
  default: ""
